name: Android

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - 'package-lock.json'

permissions:
  actions: write
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: zulu
          cache: gradle

      - name: Install dependencies
        run: npm ci

      - name: Bundle JS
        run: |
          mkdir -p android/app/src/main/assets
          npx react-native bundle \
            --platform android \
            --dev false \
            --entry-file index.js \
            --bundle-output android/app/src/main/assets/index.android.bundle \
            --assets-dest android/app/src/main/res

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Locate APK
        id: apk
        run: |
          APK=$(find android/app/build/outputs/apk/release -name "*universal*.apk" | head -1)
          echo "path=$APK" >> $GITHUB_OUTPUT
          echo "Found APK: $APK"
          ls android/app/build/outputs/apk/release/

      - name: Delete old artifacts (keep last 3)
        uses: actions/github-script@v7
        with:
          script: |
            const { data: { artifacts } } = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: 'HetznerOpenControl-release',
              per_page: 100,
            });
            const sorted = artifacts.sort((a, b) => new Date(b.created_at) - new Date(a.created_at));
            for (const artifact of sorted.slice(3)) {
              await github.rest.actions.deleteArtifact({
                owner: context.repo.owner,
                repo: context.repo.repo,
                artifact_id: artifact.id,
              });
              console.log(`Deleted artifact ${artifact.id} (${artifact.created_at})`);
            }

      - uses: actions/upload-artifact@v4
        with:
          name: HetznerOpenControl-release
          path: ${{ steps.apk.outputs.path }}
          retention-days: 90
          compression-level: 0

      - name: Create GitHub Release
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const { version } = JSON.parse(fs.readFileSync('package.json', 'utf8'));
            const apkPath = '${{ steps.apk.outputs.path }}';

            try {
              const existing = await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag: version,
              });
              await github.rest.repos.deleteRelease({
                owner: context.repo.owner,
                repo: context.repo.repo,
                release_id: existing.data.id,
              });
            } catch {}

            const release = await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: version,
              name: `HetznerOpenControl ${version}`,
              body: `## Android Release\n\nVersion \`${version}\`.`,
              draft: false,
              prerelease: false,
            });

            await github.rest.repos.uploadReleaseAsset({
              owner: context.repo.owner,
              repo: context.repo.repo,
              release_id: release.data.id,
              name: `HetznerOpenControl-${version}.apk`,
              data: fs.readFileSync(apkPath),
            });

            console.log(`Release ${version} created successfully`);
